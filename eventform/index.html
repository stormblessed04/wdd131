<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Practice with forms">
        <meta name="author" content="Kyle Nordick">
        <title>Event Sign Up Form</title>
        <link rel="icon" href="images/favicon.ico">
        <link rel="stylesheet" href="styles/style.css" />
        <script src="scripts/eventform.js" defer></script>
    </head>
    <body>
        <main class="wrapper">
            <h1>Event Ticket</h1>

            <form id="eventform">
            <div class="field">
                <label for="first-name">First Name</label>
                <input id="first-name" name="firstName" type="text" required />
            </div>

            <div class="field">
                <label for="last-name">Last Name</label>
                <input id="last-name" name="lastName" type="text" required />
            </div>

            <div class="field full">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" required />
            </div>

            <div class="field">
                <label for="type-select">Type</label>
                <select
                id="type-select"
                name="typeSelect"
                aria-controls="student-id-container"
                aria-controls="access-code-container"
                required
                >
                <option value="">Choose one</option>
                <option value="student">Student</option>
                <option value="guest">Guest</option>
                </select>
            </div>

            <div class="field">
                <label for="event-date">Event Date</label>
                <input id="event-date" name="eventDate" type="date" required />
            </div>

            <div id="student-id-container" class="field full" hidden>
                <label for="student-id">Student I#</label>
                <input id="student-id" name="studentId" type="tel" maxlength=9/>
            </div>

            <div id="access-code-container" class="field full" hidden>
                <label for="access-code">Access Code</label>
                <input id="access-code" name="accessCode" type="text" />
            </div>

            <button class="full" type="submit">Create Ticket</button>
            </form>

            <section id="output" aria-live="polite"></section>
        </main>
    </body>
</html>

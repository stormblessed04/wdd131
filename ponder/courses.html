<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <meta name="description" content="Practice with javascript objects">
        <meta name="author" content="Kyle Nordick">
        <title>JS Objects</title>
        <script defer src="scripts/courses.js"></script>

    <body>
        <h1 id="courseName"></h1>
        <img>
